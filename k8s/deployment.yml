apiVersion: apps/v1
kind: Deployment

metadata:
  name: valustride-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: valustride

  template:
    metadata:
      labels:
        app: valustride

    spec:
      containers:
      - name: valustride
        image: sudeepkumarreddyeaga/valustride:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8501